# OAK Multi-Camera Rig Configuration.
#
# Each entry is keyed by `serial_no`; the tracker resolves the camera's
# `key`, `robot_part`, `image_mode`, and `rect_calib` from
# rena_bringup/config/config.yaml. Only the rig pose of the left/right
# cameras is specified here.
#
# Transforms are rig_from_camera (3x4 or 4x4 pose of the camera in the rig frame).

stereo_cameras:
  - serial_no: "1944301071E8975A00"
    left_camera:
      transform:              # identity rotation, offset half-baseline along -X
        - [1, 0, 0, -0.0375]
        - [0, 1, 0,  0.0]
        - [0, 0, 1,  0.0]
    right_camera:
      transform:
        - [1, 0, 0, 0.0375]
        - [0, 1, 0, 0.0]
        - [0, 0, 1, 0.0]

  - serial_no: "1944301081EC985A00"
    left_camera:
      transform:
        - [-1, 0,  0,  0.0375]
        - [ 0, 1,  0,  0.0]
        - [ 0, 0, -1,  0.25]
    right_camera:
      transform:
        - [-1, 0,  0, -0.0375]
        - [ 0, 1,  0,  0.0]
        - [ 0, 0, -1,  0.25]
