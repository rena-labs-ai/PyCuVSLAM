# OAK Multi-Camera Rig Configuration
# OAK-D-PRO-W baseline: 75mm (±37.5mm from center)
# Raw mode: topics are image_raw (not image_rect). cuVSLAM rectifies internally
# using per-camera K, D from <...>/camera_info and the transforms below.

stereo_cameras:
  - name: 'oak_base_front'
    left_topic: '/oak_base_front/left/image_raw'
    right_topic: '/oak_base_front/right/image_raw'
    left_camera:
      transform:            # identity – this camera defines the rig origin
        - [1, 0, 0, -0.0375]
        - [0, 1, 0,  0.0]
        - [0, 0, 1,  0.0]
    right_camera:
      transform:
        - [1, 0, 0, 0.0375]
        - [0, 1, 0, 0.0]
        - [0, 0, 1, 0.0]

