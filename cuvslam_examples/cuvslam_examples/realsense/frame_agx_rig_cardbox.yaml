stereo_cameras:
- serial: '146222250568' # front
  left_camera:
    transform:
    - [1, 0, 0, -0.0475]
    - [0, 1, 0, 0.0]
    - [0, 0, 1, 0.0]
  right_camera:
    transform:
    - [1, 0, 0, 0.0475]
    - [0, 1, 0, 0.0]
    - [0, 0, 1, 0.0]
- serial: '339522301389' # left
  left_camera:
    transform:
    - [0, 0, 1, -0.12]
    - [0, 1, 0, 0]
    - [-1, 0, 0, 0.1655] # 0.118 + 0.0475
  right_camera:
    transform:
    - [0, 0, 1, -0.12]
    - [0, 1, 0, 0]
    - [-1, 0, 0, 0.0705] # 0.118 - 0.0475
- serial: '242422303248' # back
  left_camera:
    transform:
    - [-1, 0, 0, 0.0475]
    - [0, 1, 0, 0]
    - [0, 0, -1, 0.233]
  right_camera:
    transform:
    - [-1, 0, 0, -0.0475]
    - [0, 1, 0, 0]
    - [0, 0, -1, 0.233]

