stereo_cameras:
- serial: '146222250568' # front
  left_camera:
    transform:
    - [1, 0, 0, -0.0475]
    - [0, 1, 0, 0.0]
    - [0, 0, 1, 0.0]
  right_camera:
    transform:
    - [1, 0, 0, 0.0475]
    - [0, 1, 0, 0.0]
    - [0, 0, 1, 0.0]
- serial: '339522301389' # left
  left_camera:
    transform:
    - [0, 0, 1, -0.135]
    - [0, 1, 0, 0]
    - [-1, 0, 0, 0.1825] # 0.135 + 0.0475
  right_camera:
    transform:
    - [0, 0, 1, -0.135]
    - [0, 1, 0, 0]
    - [-1, 0, 0, 0.0875] # 0.135 - 0.0475
- serial: '242422303248' # back
  left_camera:
    transform:
    - [-1, 0, 0, 0.0475]
    - [0, 1, 0, 0]
    - [0, 0, -1, 0.255]
  right_camera:
    transform:
    - [-1, 0, 0, -0.0475]
    - [0, 1, 0, 0]
    - [0, 0, -1, 0.255]

